name: "Build and Push to Attic"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  BUILDER_COUNTS: '{"ubuntu-24.04": 3}'

jobs:
  config:
    name: Evaluate Targets
    runs-on: ubuntu-24.04
    outputs:
      hosts: ${{ steps.set-matrix.outputs.hosts }}
      packages: ${{ steps.set-matrix.outputs.packages }}
      has_builds: ${{ steps.set-matrix.outputs.has_builds }}
      builder_matrix: ${{ steps.set-builders.outputs.builder_matrix }}
      builders_list: ${{ steps.set-builders.outputs.builders_list }}
      run_suffix: ${{ steps.set-builders.outputs.run_suffix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=
            extra-substituters = https://nix-community.cachix.org https://cache.nixos-cuda.org

      - name: Run Flake Check
        run: nix flake check -L --keep-going --override-input nix-secrets ./nix-secrets-dummy

      - name: Check Cache & Generate Matrix
        id: set-matrix
        env:
          ATTIC_ENDPOINT: ${{ secrets.ATTIC_ENDPOINT }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE }}
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          echo "::group::🔍 Evaluating Flake Targets"
          JSON=$(nix eval --json --override-input nix-secrets ./nix-secrets-dummy .#debug.matrix)
          echo "::endgroup::"

          UPSTREAMS=(
            "https://cache.nixos.org"
            "https://nix-community.cachix.org"
            "https://cache.nixos-cuda.org"
          )

          check_cache_source() {
            local path=$1
            local hash=$(echo "$path" | awk -F/ '{print $4}' | awk -F- '{print $1}')

            local attic_url="${ATTIC_ENDPOINT%/}/$ATTIC_CACHE"
            if curl --output /dev/null --silent --head --fail -H "Authorization: Bearer $ATTIC_TOKEN" "$attic_url/$hash.narinfo"; then
              echo "Attic Private"
              return 0
            fi

            for cache in "${UPSTREAMS[@]}"; do
              if [[ "$cache" == *"$ATTIC_CACHE"* ]]; then continue; fi
              if curl --output /dev/null --silent --head --fail "$cache/$hash.narinfo"; then
                echo "$cache"
                return 0
              fi
            done
            return 1
          }

          {
            echo "### 📡 Cache Hit Analysis"
            echo "| Type | Name | Status | Source |"
            echo "| :--- | :--- | :--- | :--- |"
          } >> $GITHUB_STEP_SUMMARY

          BUILD_HOSTS="[]"
          BUILD_PACKAGES="[]"

          echo "::group::📡 Checking Caches"

          process_target() {
            local type=$1
            local name=$2
            local path=$3

            echo -n "Checking $type: $name ... "

            if source_url=$(check_cache_source "$path"); then
              echo "✅ Cached ($source_url)"
              echo "| $type | **$name** | ✅ Cached | \`$source_url\` |" >> $GITHUB_STEP_SUMMARY
            else
              echo "🔨 Needs Build"
              echo "| $type | **$name** | 🔨 **Build** | - |" >> $GITHUB_STEP_SUMMARY

              if [[ "$type" == "Host" ]]; then
                BUILD_HOSTS=$(echo "$BUILD_HOSTS" | jq -c ". + [\"$name\"]")
              else
                BUILD_PACKAGES=$(echo "$BUILD_PACKAGES" | jq -c ". + [\"$name\"]")
              fi
            fi
          }

          while read -r name path; do
            process_target "Package" "$name" "$path"
          done < <(echo "$JSON" | jq -r '.packages | to_entries[] | "\(.key) \(.value)"')

          while read -r name path; do
            process_target "Host" "$name" "$path"
          done < <(echo "$JSON" | jq -r '.hosts | to_entries[] | "\(.key) \(.value)"')

          echo "::endgroup::"

          echo "hosts=$BUILD_HOSTS" >> $GITHUB_OUTPUT
          echo "packages=$BUILD_PACKAGES" >> $GITHUB_OUTPUT

          if [ "$BUILD_HOSTS" == "[]" ] && [ "$BUILD_PACKAGES" == "[]" ]; then
            echo "has_builds=false" >> $GITHUB_OUTPUT
          else
            echo "has_builds=true" >> $GITHUB_OUTPUT
          fi

      - id: set-builders
        if: steps.set-matrix.outputs.has_builds == 'true'
        name: Generate Builder Matrix
        run: |
          SUFFIX=$(openssl rand -hex 3)
          echo "run_suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

          MATRIX_JSON=$(echo '${{ env.BUILDER_COUNTS }}' | jq -c '[
              to_entries[] | .key as $os | .value as $count |
              range(1; $count + 1) | { os: $os, id: "\($os)-\(.)" }
            ]
          ')
          echo "builder_matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

          BUILDERS_LIST=$(echo "$MATRIX_JSON" | jq -r --arg suffix "$SUFFIX" 'map("nix-builder-\($suffix)-\(.id)") | join(" ")')
          echo "builders_list=$BUILDERS_LIST" >> "$GITHUB_OUTPUT"

  builder:
    needs: config
    if: needs.config.outputs.has_builds == 'true'
    name: Builder ${{ matrix.builder.id }}
    runs-on: ${{ matrix.builder.os }}
    strategy:
      fail-fast: false
      matrix:
        builder: ${{ fromJSON(needs.config.outputs.builder_matrix) }}
    steps:
      - name: Setup Distributed Nix Builder
        uses: Misaka13514/setup-distributed-nix-builds@main
        with:
          tailscale_authkey: ${{ secrets.TS_OAUTH_SECRET }}
          tailscale_hostname: nix-builder-${{ needs.config.outputs.run_suffix }}-${{ matrix.builder.id }}
          tailscale_tags: tag:nix-ci-builder
          role: builder
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=
            extra-substituters = https://nix-community.cachix.org https://cache.nixos-cuda.org

  coordinator:
    needs: config
    if: needs.config.outputs.has_builds == 'true'
    name: Coordinator Build Job
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Coordinator & Connect Builders
        uses: Misaka13514/setup-distributed-nix-builds@main
        with:
          tailscale_authkey: ${{ secrets.TS_OAUTH_SECRET }}
          tailscale_hostname: nix-coordinator-${{ needs.config.outputs.run_suffix }}
          tailscale_tags: tag:nix-ci-coordinator
          role: coordinator
          builders: ${{ needs.config.outputs.builders_list }}
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=
            extra-substituters = https://nix-community.cachix.org https://cache.nixos-cuda.org

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0.4.1
        with:
          endpoint: ${{ secrets.ATTIC_ENDPOINT }}
          cache: ${{ secrets.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}
          skip-push: true

      - name: Distributed Build & Push to Attic
        env:
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE }}
          PACKAGES: ${{ needs.config.outputs.packages }}
          HOSTS: ${{ needs.config.outputs.hosts }}
        run: |
          echo "🚀 Preparing Distributed Build Targets..."
          BUILD_ARGS=()
          TARGET_NAMES=()

          for pkg in $(echo "$PACKAGES" | jq -r '.[]'); do
            BUILD_ARGS+=(".#packages.x86_64-linux.$pkg")
            TARGET_NAMES+=("$pkg (Package)")
          done

          for host in $(echo "$HOSTS" | jq -r '.[]'); do
            BUILD_ARGS+=(".#nixosConfigurations.$host.config.system.build.toplevel")
            TARGET_NAMES+=("$host (Host)")
          done

          if [ ${#BUILD_ARGS[@]} -eq 0 ]; then
            echo "No targets to build."
            exit 0
          fi

          echo "::group::🔨 Compiling All Targets Across Cluster"
          OUT_PATHS=$(nix build -L --max-jobs 0 "${BUILD_ARGS[@]}" --print-out-paths --override-input nix-secrets ./nix-secrets-dummy)
          echo "::endgroup::"

          echo "::group::🚀 Pushing Everything to Attic Cache"
          attic push -j 1 "$ATTIC_CACHE" $OUT_PATHS
          echo "::endgroup::"

          echo "::group::📊 Generating Analysis"
          echo "### ✅ Distributed Build Cluster Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Successfully Built Targets:**" >> $GITHUB_STEP_SUMMARY
          for name in "${TARGET_NAMES[@]}"; do
            echo "- \`$name\`" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>📦 Output Store Paths & Closure Sizes</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for path in $OUT_PATHS; do
            if SIZE_BYTES=$(nix path-info -S "$path" 2>/dev/null | awk '{print $2}'); then
              TOTAL_SIZE=$(numfmt --to=iec-i --suffix=B "$SIZE_BYTES")
              echo "- \`$path\` (**$TOTAL_SIZE**)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- \`$path\` (Unknown Size)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "::endgroup::"
